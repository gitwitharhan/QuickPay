<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuickPay</title>
    <style>
      .initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background: #030303;
        color: white;
        font-family: 'Inter', sans-serif;
      }
      .logo-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        margin-bottom: 24px;
      }
      .logo-text {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        opacity: 0.9;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: .5; transform: scale(0.95); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <svg class="logo-pulse" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"></path>
          <path d="M12 18V6"></path>
        </svg>
        <div class="logo-text">QuickPay</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
